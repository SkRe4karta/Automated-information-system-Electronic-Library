{% extends 'base.html' %}

{% block title %}Вход в систему | АИС «Электронная библиотека»{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-custom shadow p-4 border border-secondary">
            <div class="card-body text-center">
                <i class="bi bi-shield-lock text-primary" style="font-size: 3.5rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                <h3 class="card-title mt-3 mb-4 font-weight-bold" style="font-family: 'Outfit', sans-serif;">Авторизация</h3>
                
                <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}" class="text-start">
                    <div class="mb-3">
                        <label for="login" class="form-label text-secondary small">Логин</label>
                        <input type="text" class="form-control bg-dark border-secondary text-light" id="login" name="login" placeholder="Введите логин" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label text-secondary small">Пароль</label>
                        <input type="password" class="form-control bg-dark border-secondary text-light" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input bg-dark border-secondary text-light" id="remember" name="remember">
                        <label class="form-check-label text-secondary small" for="remember">Запомнить меня</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-gradient btn-lg py-2">Войти</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
